[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# SPA routing — redirect all non-asset requests to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Proxy /.netlify/functions/* so frontend can call /api/* cleanly
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200
